<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Our Adventure - A Love Story</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    #game-container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      max-height: 700px;
      background: #0a0a1a;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
      overflow: hidden;
      position: relative;
      border: 2px solid #e94560;
      display: flex;
      flex-direction: column;
    }

    #canvas-wrapper {
      position: relative;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .dialogue-box {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 600px;
      background: rgba(10, 10, 26, 0.98);
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 15px;
      pointer-events: auto;
      display: none;
      animation: slideUp 0.3s ease;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    .dialogue-portrait {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #e94560;
      border-radius: 8px;
      float: left;
      margin-right: 12px;
      background: #1a1a2e;
    }

    .dialogue-name {
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      color: #e94560;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .dialogue-text {
      color: #eee;
      font-size: 14px;
      line-height: 1.5;
      min-height: 40px;
      overflow: hidden;
    }

    .dialogue-next {
      color: #e94560;
      font-size: 11px;
      margin-top: 8px;
      text-align: right;
      animation: blink 1s infinite;
      clear: both;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #start-screen, #end-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 26, 0.98);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      pointer-events: auto;
    }

    .start-portraits {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      align-items: center;
    }

    .start-portrait {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #e94560;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }

    .heart-between {
      font-size: 30px;
      animation: heartbeat 1s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      color: #e94560;
      font-size: 20px;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
      padding: 0 20px;
    }

    .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
      text-align: center;
      padding: 0 20px;
    }

    .btn {
      background: transparent;
      border: 2px solid #e94560;
      color: #e94560;
      padding: 15px 40px;
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      text-transform: uppercase;
      pointer-events: auto;
    }

    .btn:hover, .btn:active {
      background: #e94560;
      color: #fff;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
      transform: scale(1.05);
    }

    #inventory {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .inv-item {
      width: 36px;
      height: 36px;
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #533483;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }

    .inv-item.collected {
      border-color: #e94560;
      box-shadow: 0 0 10px rgba(233, 69, 96, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #quest-log {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #533483;
      border-radius: 8px;
      padding: 8px 12px;
      color: #aaa;
      font-size: 11px;
      max-width: 180px;
      pointer-events: auto;
    }

    #quest-log .quest-title {
      color: #e94560;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 10px;
    }

    /* Touch Controls */
    #touch-controls {
      height: 130px;
      background: rgba(10, 10, 26, 0.95);
      border-top: 2px solid #e94560;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 10px;
      pointer-events: auto;
      z-index: 50;
    }

    .dpad {
      display: grid;
      grid-template-columns: 55px 55px 55px;
      grid-template-rows: 55px 55px;
      gap: 3px;
    }

    .dpad-btn {
      background: rgba(233, 69, 96, 0.15);
      border: 2px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      color: #e94560;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: all 0.1s;
    }

    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(233, 69, 96, 0.4);
      transform: scale(0.95);
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
    }

    .dpad-btn.empty {
      background: transparent;
      border: none;
      pointer-events: none;
    }

    .action-btn {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: rgba(233, 69, 96, 0.15);
      border: 2px solid rgba(233, 69, 96, 0.4);
      color: #e94560;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      margin-left: 15px;
      transition: all 0.1s;
    }

    .action-btn:active, .action-btn.pressed {
      background: rgba(233, 69, 96, 0.4);
      transform: scale(0.95);
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    .hidden { display: none !important; }

    #end-screen h1 { font-size: 16px; margin-bottom: 20px; }
    #end-screen .final-message {
      color: #eee;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
      line-height: 2;
      margin-bottom: 25px;
      padding: 0 20px;
    }

    .end-portraits {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .end-portrait {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #e94560;
      border-radius: 10px;
    }

    /* Mobile */
    @media (max-width: 600px) {
      #game-container { border-radius: 0; border: none; max-height: 100vh; }
      h1 { font-size: 16px; }
      .subtitle { font-size: 12px; }
      .dialogue-text { font-size: 13px; }
      .dialogue-portrait { width: 48px; height: 48px; }
      #quest-log { font-size: 10px; max-width: 140px; }
      .start-portrait { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <div id="canvas-wrapper">
    <canvas id="gameCanvas" width="800" height="480"></canvas>

    <div id="ui-layer">
      <div id="quest-log">
        <div class="quest-title">Current Quest</div>
        <div id="quest-text">Find the lost memories...</div>
      </div>

      <div id="inventory">
        <div class="inv-item" id="inv-0" title="Memory Fragment">💭</div>
        <div class="inv-item" id="inv-1" title="Star Light">⭐</div>
        <div class="inv-item" id="inv-2" title="Rose">🌹</div>
      </div>

      <div class="dialogue-box" id="dialogue-box">
        <img class="dialogue-portrait" id="dialogue-portrait" src="" alt="">
        <div class="dialogue-name" id="dialogue-name">Name</div>
        <div class="dialogue-text" id="dialogue-text">Text goes here...</div>
        <div class="dialogue-next">▼ Tap to continue</div>
      </div>
    </div>

    <div id="start-screen">
      <div class="start-portraits">
        <img class="start-portrait" id="start-her" src="" alt="Her">
        <div class="heart-between">❤️</div>
        <img class="start-portrait" id="start-you" src="" alt="You">
      </div>
      <h1>Our Adventure</h1>
      <p class="subtitle">A little journey through our memories...</p>
      <button class="btn" onclick="startGame()">Start Our Story ❤️</button>
    </div>

    <div id="end-screen" class="hidden">
      <div class="end-portraits">
        <img class="end-portrait" id="end-her" src="" alt="Her">
        <img class="end-portrait" id="end-you" src="" alt="You">
      </div>
      <h1>You Completed Our Adventure!</h1>
      <p class="final-message" id="final-message"></p>
      <button class="btn" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <div id="touch-controls">
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="up">▲</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-btn" data-dir="down">▼</div>
      <div class="dpad-btn" data-dir="right">▶</div>
    </div>
    <div class="action-btn" id="action-btn">A</div>
  </div>
</div>

  // ===== COLLISION SYSTEM =====
  // AABB collision check between two rectangles
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w &&
      a.x + a.w > b.x &&
      a.y < b.y + b.h &&
      a.y + a.h > b.y;
  }

  // Check if player at position (px, py) collides with any obstacle
  function checkCollision(px, py) {
    const playerRect = {x: px - player.w/2, y: py - player.h/2, w: player.w, h: player.h};
    const map = maps[currentMap];

    for (let obs of map.obstacles) {
      if (rectsOverlap(playerRect, obs)) {
        return true;
      }
    }
    return false;
  }

  // Try to move player by (dx, dy), slide against walls if needed
  function tryMove(dx, dy) {
    // Try diagonal first
    let newX = player.x + dx;
    let newY = player.y + dy;

    if (!checkCollision(newX, newY)) {
      player.x = newX;
      player.y = newY;
      return;
    }

    // Try horizontal only
    if (dx !== 0 && !checkCollision(player.x + dx, player.y)) {
      player.x += dx;
      return;
    }

    // Try vertical only
    if (dy !== 0 && !checkCollision(player.x, player.y + dy)) {
      player.y += dy;
      return;
    }

    // Can't move - blocked
  }

  // ===== SETUP TOUCH CONTROLS =====
  function setupTouchControls() {
    const dpadButtons = document.querySelectorAll('.dpad-btn[data-dir]');
    const actionBtn = document.getElementById('action-btn');

    dpadButtons.forEach(btn => {
      const dir = btn.dataset.dir;

      const startHandler = (e) => {
        e.preventDefault();
        touchState[dir] = true;
        btn.classList.add('pressed');
      };

      const endHandler = (e) => {
        e.preventDefault();
        touchState[dir] = false;
        btn.classList.remove('pressed');
      };

      btn.addEventListener('touchstart', startHandler, {passive: false});
      btn.addEventListener('touchend', endHandler, {passive: false});
      btn.addEventListener('touchcancel', endHandler, {passive: false});
      btn.addEventListener('mousedown', startHandler);
      btn.addEventListener('mouseup', endHandler);
      btn.addEventListener('mouseleave', endHandler);
    });

    const actionStart = (e) => {
      e.preventDefault();
      actionBtn.classList.add('pressed');
      if (gameState === 'dialogue') {
        advanceDialogue();
      }
    };

    const actionEnd = (e) => {
      e.preventDefault();
      actionBtn.classList.remove('pressed');
    };

    actionBtn.addEventListener('touchstart', actionStart, {passive: false});
    actionBtn.addEventListener('touchend', actionEnd, {passive: false});
    actionBtn.addEventListener('mousedown', actionStart);
    actionBtn.addEventListener('mouseup', actionEnd);
  }

  // ===== EVENT LISTENERS =====
  window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });

  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('touchstart', (e) => {
    if (gameState === 'dialogue') {
      e.preventDefault();
      advanceDialogue();
    }
  }, {passive: false});

  canvas.addEventListener('click', () => {
    if (gameState === 'dialogue') {
      advanceDialogue();
    }
  });

  // ===== GAME FUNCTIONS =====
  function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    gameState = 'playing';
    updateQuestLog();
    gameLoop();
  }

  function updateQuestLog() {
    document.getElementById('quest-text').textContent = maps[currentMap].quest;
  }

  function startDialogue(npc) {
    gameState = 'dialogue';
    dialogueQueue = npc.dialogues;
    currentDialogue = 0;

    document.getElementById('dialogue-portrait').src = npc.portrait;
    document.getElementById('dialogue-name').textContent = npc.name;
    document.getElementById('dialogue-text').textContent = dialogueQueue[0];
    document.getElementById('dialogue-box').style.display = 'block';

    if (npc.questUpdate) {
      maps[currentMap].quest = npc.questUpdate;
      updateQuestLog();
    }
  }

  function advanceDialogue() {
    currentDialogue++;
    if (currentDialogue >= dialogueQueue.length) {
      endDialogue();
    } else {
      document.getElementById('dialogue-text').textContent = dialogueQueue[currentDialogue];
    }
  }

  function endDialogue() {
    gameState = 'playing';
    document.getElementById('dialogue-box').style.display = 'none';
    dialogueQueue = [];

    if (currentMap === 3) {
      setTimeout(showEndScreen, 500);
    }
  }

  function showEndScreen() {
    gameState = 'end';
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('final-message').innerHTML =
      "You collected all our memories...<br>" +
      "Just like you collected my heart.<br>" +
      "Every moment with you is a treasure.<br>" +
      "I love you forever and always. ❤️";
  }

  // Check NPC interaction (must be close and facing them)
  function checkNPCInteraction() {
    if (gameState !== 'playing') return false;
    const map = maps[currentMap];

    for (let npc of map.npcs) {
      const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
      if (dist < 35) {
        player.x =player.x-dist;
        player.y = player.y+dist
        startDialogue(npc);
        return true;
      }
    }
    return false;
  }

  function checkItemCollection() {
    const map = maps[currentMap];
    for (let item of map.items) {
      if (!item.collected) {
        const dist = Math.hypot(player.x - item.x, player.y - item.y);
        if (dist < 30) {
          item.collected = true;
          inventory[item.id] = true;
          document.getElementById(`inv-${item.id}`).classList.add('collected');
          spawnHearts(item.x, item.y);

          gameState = 'dialogue';
          dialogueQueue = [`You found the ${item.name}!`];
          currentDialogue = 0;
          document.getElementById('dialogue-portrait').src = item.id === 2 ? YOU_PIXEL_ART : HER_PIXEL_ART;
          document.getElementById('dialogue-name').textContent = 'Found!';
          document.getElementById('dialogue-text').textContent = dialogueQueue[0];
          document.getElementById('dialogue-box').style.display = 'block';
        }
      }
    }
  }

  function checkPortal() {
    const map = maps[currentMap];
    if (!map.portal) return;

    const p = map.portal;
    const collected = inventory.filter(i => i).length;
    const playerRect = {x: player.x - player.w/2, y: player.y - player.h/2, w: player.w, h: player.h};
    const portalRect = {x: p.x, y: p.y, w: p.w, h: p.h};

    if (rectsOverlap(playerRect, portalRect)) {
      if (collected >= p.req) {
        // Transition!
        currentMap = p.to;
        player.x = 60;
        player.y = 240;
        updateQuestLog();

        // Flash effect
        ctx.fillStyle = 'rgba(233, 69, 96, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (gameState === 'playing') {
        const needed = p.req - collected;
        gameState = 'dialogue';
        dialogueQueue = [`You need ${needed} more memory${needed > 1 ? 'ies' : 'y'} to proceed...`];
        currentDialogue = 0;
        document.getElementById('dialogue-portrait').src = HER_PIXEL_ART;
        document.getElementById('dialogue-name').textContent = 'Locked';
        document.getElementById('dialogue-text').textContent = dialogueQueue[0];
        document.getElementById('dialogue-box').style.display = 'block';

        // Push back
        player.x = p.x - 40;
      }
    }
  }

  function spawnHearts(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 3,
        vy: -Math.random() * 3 - 1,
        life: 80,
        maxLife: 80,
        emoji: ['❤️', '💖', '💕', '✨', '💗'][Math.floor(Math.random() * 5)]
      });
    }
  }

  // ===== UPDATE =====
  function update() {
    if (gameState !== 'playing') return;

    let dx = 0, dy = 0;

    // Keyboard
    if (keys['w'] || keys['arrowup']) { dy = -player.speed; player.facing = 'up'; }
    if (keys['s'] || keys['arrowdown']) { dy = player.speed; player.facing = 'down'; }
    if (keys['a'] || keys['arrowleft']) { dx = -player.speed; player.facing = 'left'; }
    if (keys['d'] || keys['arrowright']) { dx = player.speed; player.facing = 'right'; }

    // Touch
    if (touchState.up) { dy = -player.speed; player.facing = 'up'; }
    if (touchState.down) { dy = player.speed; player.facing = 'down'; }
    if (touchState.left) { dx = -player.speed; player.facing = 'left'; }
    if (touchState.right) { dx = player.speed; player.facing = 'right'; }

    player.moving = dx !== 0 || dy !== 0;
    if (player.moving) player.frame++;

    // Use proper collision system
    tryMove(dx, dy);

    // Keep in bounds (final safety)
    player.x = Math.max(20, Math.min(780, player.x));
    player.y = Math.max(20, Math.min(460, player.y));

    // Check interactions
    checkNPCInteraction();
    checkItemCollection();
    checkPortal();

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life--;
      return p.life > 0;
    });
  }

  // ===== DRAW =====
  function draw() {
    const map = maps[currentMap];

    // Background
    ctx.fillStyle = map.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Ground tiles (pixel art style)
    ctx.fillStyle = map.ground;
    for (let x = 0; x < canvas.width; x += 32) {
      for (let y = 0; y < canvas.height; y += 32) {
        if ((Math.floor(x/32) + Math.floor(y/32)) % 2 === 0) {
          ctx.fillRect(x + 2, y + 2, 28, 28);
        }
      }
    }

    // Draw obstacles with pixel art style
    for (let obs of map.obstacles) {
      // Main block
      ctx.fillStyle = '#533483';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      // Highlight top
      ctx.fillStyle = '#7a5fb5';
      ctx.fillRect(obs.x, obs.y, obs.w, 4);
      // Shadow bottom
      ctx.fillStyle = '#3a2866';
      ctx.fillRect(obs.x, obs.y + obs.h - 4, obs.w, 4);
      // Pixel detail
      ctx.fillStyle = '#6b4fa3';
      for (let px = obs.x + 4; px < obs.x + obs.w; px += 12) {
        for (let py = obs.y + 8; py < obs.y + obs.h - 4; py += 12) {
          ctx.fillRect(px, py, 4, 4);
        }
      }
    }

    // Draw portal
    if (map.portal) {
      const p = map.portal;
      const collected = inventory.filter(i => i).length;
      const canEnter = collected >= p.req;
      const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.5;

      // Glow
      ctx.fillStyle = canEnter
        ? `rgba(233, 69, 96, ${pulse * 0.3})`
        : 'rgba(100, 100, 100, 0.2)';
      ctx.fillRect(p.x - 4, p.y - 4, p.w + 8, p.h + 8);

      // Frame
      ctx.fillStyle = canEnter ? '#e94560' : '#666';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = canEnter ? '#ff8fa3' : '#999';
      ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);

      // Arrow indicator
      ctx.fillStyle = canEnter ? '#fff' : '#888';
      ctx.font = '16px serif';
      ctx.textAlign = 'center';
      ctx.fillText('→', p.x + p.w/2, p.y + p.h/2 + 5);
    }

    // Draw items with bounce animation
    for (let item of map.items) {
      if (!item.collected) {
        const bounce = Math.sin(Date.now() / 300) * 6;
        const glow = Math.sin(Date.now() / 200) * 0.2 + 0.3;

        // Glow circle
        ctx.fillStyle = `rgba(233, 69, 96, ${glow})`;
        ctx.beginPath();
        ctx.arc(item.x, item.y + bounce, 18, 0, Math.PI * 2);
        ctx.fill();

        // Emoji
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.emoji, item.x, item.y + bounce);
      }
    }

    // Draw NPCs with pixel art style
    for (let npc of map.npcs) {
      const bounce = Math.sin(Date.now() / 400) * 3;
      const nx = npc.x;
      const ny = npc.y + bounce;

      // Glow
      ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
      ctx.beginPath();
      ctx.arc(nx, ny, 28, 0, Math.PI * 2);
      ctx.fill();

      // Body (pixel style)
      ctx.fillStyle = npc.color;
      ctx.fillRect(nx - 12, ny - 12, 24, 24);
      ctx.fillStyle = '#fff';
      ctx.fillRect(nx - 12, ny - 12, 24, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(nx - 12, ny + 8, 24, 4);

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(nx - 8, ny - 4, 5, 5);
      ctx.fillRect(nx + 3, ny - 4, 5, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(nx - 6, ny - 2, 2, 2);
      ctx.fillRect(nx + 5, ny - 2, 2, 2);

      // Name tag
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(nx - 30, ny - 28, 60, 14);
      ctx.fillStyle = '#fff';
      ctx.font = '9px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(npc.name.split(' ')[0], nx, ny - 18);
    }

    // Draw player (pixel art style - YOU)
    const px = player.x;
    const py = player.y;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(px - 10, py + 10, 20, 6);

    // Body
    ctx.fillStyle = player.color;
    ctx.fillRect(px - 10, py - 12, 20, 24);

    // Hair (darker top)
    ctx.fillStyle = '#b03050';
    ctx.fillRect(px - 10, py - 12, 20, 6);

    // Face highlight
    ctx.fillStyle = '#ff8fa3';
    ctx.fillRect(px - 10, py - 6, 20, 4);

    // Eyes (based on facing)
    ctx.fillStyle = '#fff';
    const eyeOffset = player.facing === 'left' ? -3 : player.facing === 'right' ? 3 : 0;
    ctx.fillRect(px - 7 + eyeOffset, py - 3, 5, 5);
    ctx.fillRect(px + 2 + eyeOffset, py - 3, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(px - 5 + eyeOffset, py - 1, 2, 2);
    ctx.fillRect(px + 4 + eyeOffset, py - 1, 2, 2);

    // Blush
    ctx.fillStyle = 'rgba(255, 150, 150, 0.6)';
    ctx.fillRect(px - 9, py + 4, 4, 2);
    ctx.fillRect(px + 5, py + 4, 4, 2);

    // Smile
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - 3, py + 6, 6, 2);

    // Particles
    for (let p of particles) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.font = '16px serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.emoji, p.x, p.y);
      ctx.globalAlpha = 1;
    }

    // Map name
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = 'bold 36px Quicksand';
    ctx.textAlign = 'center';
    ctx.fillText(map.name, canvas.width/2, 70);
  }

  // ===== GAME LOOP =====
  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // ===== INIT =====
  setupTouchControls();
  draw();
</script>
